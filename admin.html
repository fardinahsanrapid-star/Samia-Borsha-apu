<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 min-h-screen p-6 md:p-10">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-10 text-primary">Admin Dashboard</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-base-100 p-6 rounded-2xl shadow-xl sticky top-10">
                    <h2 class="text-2xl font-bold mb-6 border-b pb-2">Add New Project</h2>
                    <form id="addProjectForm" class="space-y-4">
                        <div class="form-control">
                            <label class="label"><span class="label-text font-semibold">Project Title</span></label>
                            <input type="text" id="title" class="input input-bordered w-full" required />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text font-semibold">Description</span></label>
                            <textarea id="description" class="textarea textarea-bordered h-24" required></textarea>
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text font-semibold">Image URL</span></label>
                            <input type="url" id="image" placeholder="https://..." class="input input-bordered w-full" required />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text font-semibold">Live Link</span></label>
                            <input type="url" id="link" placeholder="https://..." class="input input-bordered w-full" required />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text font-semibold">Tags (Comma separated)</span></label>
                            <input type="text" id="tags" placeholder="React, Node.js, MongoDB" class="input input-bordered w-full" required />
                        </div>
                        <button type="submit" class="btn btn-primary w-full mt-4">Save Project</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-base-100 p-6 rounded-2xl shadow-xl">
                    <h2 class="text-2xl font-bold mb-6 border-b pb-2">Manage Projects</h2>
                    <div id="admin-project-list" class="space-y-4">
                        <div class="text-center py-10"><span class="loading loading-spinner text-primary"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/projects'; // লাইভ করলে এটি পরিবর্তন করার দরকার নেই, যদি একই সার্ভারে থাকে

        // 1. Fetch and Display Projects in Admin Panel
        async function loadAdminProjects() {
            const container = document.getElementById('admin-project-list');
            try {
                const res = await fetch(API_URL);
                const projects = await res.json();
                
                if(projects.length === 0) {
                    container.innerHTML = "<p class='text-center text-gray-500'>No projects available.</p>";
                    return;
                }

                container.innerHTML = '';
                projects.forEach(project => {
                    container.innerHTML += `
                        <div class="flex items-center justify-between p-4 border border-base-300 rounded-xl hover:bg-base-200 transition">
                            <div class="flex items-center gap-4">
                                <img src="${project.image}" alt="Img" class="w-16 h-16 object-cover rounded-lg shadow-sm" onerror="this.src='https://via.placeholder.com/150'">
                                <div>
                                    <h3 class="font-bold text-lg">${project.title}</h3>
                                    <p class="text-sm opacity-70 truncate w-48 md:w-96">${project.description}</p>
                                </div>
                            </div>
                            <button onclick="deleteProject('${project._id}')" class="btn btn-error btn-sm text-white">Delete</button>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = "<p class='text-red-500'>Error loading projects!</p>";
            }
        }

        // 2. Add New Project
        document.getElementById('addProjectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<span class="loading loading-spinner"></span> Saving...';
            btn.disabled = true;

            const newProject = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                image: document.getElementById('image').value,
                link: document.getElementById('link').value,
                tags: document.getElementById('tags').value.split(',').map(tag => tag.trim())
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProject)
                });
                e.target.reset(); // ফর্ম ক্লিয়ার করা
                loadAdminProjects(); // লিস্ট আপডেট করা
                alert("Project Added Successfully!");
            } catch (err) {
                alert("Failed to add project!");
            } finally {
                btn.innerHTML = 'Save Project';
                btn.disabled = false;
            }
        });

        // 3. Delete Project
        async function deleteProject(id) {
            if(!confirm("Are you sure you want to delete this project?")) return;
            
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadAdminProjects(); // লিস্ট আপডেট করা
            } catch (err) {
                alert("Failed to delete project!");
            }
        }

        // Initial Load
        loadAdminProjects();
    </script>
</body>
</html>
